name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    env:
      REGISTRY_URL: ${{ secrets.PACKAGE_REGISTRY_URL }}
      PACKAGE_REGISTRY_URL: ${{ secrets.PACKAGE_REGISTRY_URL }}
      PACKAGE_REGISTRY_TOKEN: ${{ secrets.PACKAGE_REGISTRY_TOKEN }}
      PACKAGE_REGISTRY_SCOPE: ${{ secrets.PACKAGE_REGISTRY_SCOPE }}
      REGISTRY_SCOPE: ${{ secrets.PACKAGE_REGISTRY_SCOPE }}
      REGISTRY_TOKEN: ${{ secrets.PACKAGE_REGISTRY_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI
        run: bun run build:cli

      - name: Verify CLI is synced
        run: |
          set -euo pipefail
          if ! git diff --quiet -- bin/agent-mockingbird; then
            echo "bin/agent-mockingbird is out of sync with src/cli/agent-mockingbird.mjs."
            echo "Run: bun run build:cli"
            git --no-pager diff -- bin/agent-mockingbird
            exit 1
          fi

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Resolve publish metadata
        id: meta
        run: |
          set -euo pipefail
          event="${GITHUB_EVENT_NAME:-}"
          ref="${GITHUB_REF:-}"
          ref_name="${GITHUB_REF_NAME:-${GITEA_REF_NAME:-}}"
          package_version="$(bun -e 'const p=require("./package.json"); if(!p.version){process.exit(2)}; console.log(p.version)')"
          base_version="${package_version}"
          registry_url="${PACKAGE_REGISTRY_URL:-}"
          scope="${PACKAGE_REGISTRY_SCOPE:-}"
          scope="$(printf '%s' "${scope}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          scope="${scope,,}"
          registry_url="$(printf '%s' "${registry_url}" | tr -d '\r' | sed 's/[[:space:]]*$//')"
          registry_url="${registry_url%/}/"

          should_publish="false"
          npm_tag="latest"

          if [[ "${event}" == "pull_request" ]]; then
            should_publish="false"
          elif [[ "${event}" == "push" && "${ref}" == refs/tags/v* ]]; then
            should_publish="true"
            expected_tag="v${base_version}"
            if [[ "${ref_name}" != "${expected_tag}" ]]; then
              echo "Tag ${ref_name} does not match package.json version ${base_version} (${expected_tag})."
              exit 1
            fi
          elif [[ "${event}" == "workflow_dispatch" ]]; then
            should_publish="true"
          elif [[ "${event}" == "push" && "${ref}" == "refs/heads/main" ]]; then
            should_publish="true"
            package_name="@${scope}/agent-mockingbird"
            latest_published="$(bunx npm view "${package_name}" version --registry "${registry_url}" 2>/dev/null || true)"
            package_version="$(BASE_VERSION="${base_version}" LATEST_PUBLISHED="${latest_published}" bun -e '
              const base = (process.env.BASE_VERSION || "").trim();
              const latest = (process.env.LATEST_PUBLISHED || "").trim();
              const semver = /^(\d+)\.(\d+)\.(\d+)$/;
              const bumpPatch = (v) => {
                const m = v.match(semver);
                if (!m) return null;
                return `${m[1]}.${m[2]}.${Number(m[3]) + 1}`;
              };
              if (!latest) {
                console.log(base);
                process.exit(0);
              }
              const bumped = bumpPatch(latest);
              if (!bumped) {
                console.log(base);
                process.exit(0);
              }
              console.log(bumped);
            ')"
          fi

          echo "should_publish=${should_publish}" >> "${GITHUB_OUTPUT}"
          echo "package_version=${package_version}" >> "${GITHUB_OUTPUT}"
          echo "npm_tag=${npm_tag}" >> "${GITHUB_OUTPUT}"

      - name: Validate publish secrets
        if: steps.meta.outputs.should_publish == 'true'
        run: |
          set -euo pipefail
          registry_url="${PACKAGE_REGISTRY_URL:-}"
          token="${PACKAGE_REGISTRY_TOKEN:-}"
          scope="${PACKAGE_REGISTRY_SCOPE:-}"

          : "${registry_url:?Missing PACKAGE_REGISTRY_URL}"
          : "${token:?Missing PACKAGE_REGISTRY_TOKEN}"
          : "${scope:?Missing PACKAGE_REGISTRY_SCOPE}"

          registry_url="$(printf '%s' "${registry_url}" | tr -d '\r' | sed 's/[[:space:]]*$//')"
          token="$(printf '%s' "${token}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          scope="$(printf '%s' "${scope}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          scope="${scope,,}"
          echo "REGISTRY_URL=${registry_url}" >> "${GITHUB_ENV}"
          echo "REGISTRY_TOKEN=${token}" >> "${GITHUB_ENV}"
          echo "REGISTRY_SCOPE=${scope}" >> "${GITHUB_ENV}"

      - name: Build package metadata for publish
        if: steps.meta.outputs.should_publish == 'true'
        run: |
          set -euo pipefail
          PKG_VERSION="${{ steps.meta.outputs.package_version }}" bun -e '
            const fs = require("fs");
            const scope = (process.env.REGISTRY_SCOPE || "").toLowerCase();
            const version = process.env.PKG_VERSION;
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            pkg.name = `@${scope}/agent-mockingbird`;
            pkg.private = false;
            pkg.version = version;
            pkg.publishConfig = { registry: process.env.REGISTRY_URL };
            pkg.files = [
              "bin",
              "runtime-assets",
              ".agents",
              "apps/server",
              "packages/api",
              "packages/contracts",
              "dist",
              "deploy",
              "scripts",
              "drizzle",
              "drizzle.config.ts",
              "README.md",
              "bun.lock",
              "bunfig.toml",
              "tsconfig.json",
              "agent-mockingbird.config.example.json"
            ];
            fs.writeFileSync("package.json", `${JSON.stringify(pkg, null, 2)}\n`);
          '

      - name: Build installer package metadata for publish
        if: steps.meta.outputs.should_publish == 'true'
        run: |
          set -euo pipefail
          PKG_VERSION="${{ steps.meta.outputs.package_version }}" bun -e '
            const fs = require("fs");
            const path = require("path");
            const scope = (process.env.REGISTRY_SCOPE || "").toLowerCase();
            const version = process.env.PKG_VERSION;
            const pkgPath = path.join("packages", "agent-mockingbird-installer", "package.json");
            const pkg = JSON.parse(fs.readFileSync(pkgPath, "utf8"));
            pkg.name = `@${scope}/agent-mockingbird-installer`;
            pkg.private = false;
            pkg.version = version;
            pkg.publishConfig = { registry: process.env.REGISTRY_URL };
            fs.writeFileSync(pkgPath, `${JSON.stringify(pkg, null, 2)}\n`);
          '

      - name: Pack agent-mockingbird artifact
        if: steps.meta.outputs.should_publish == 'true'
        run: |
          set -euo pipefail
          tarball="agent-mockingbird-${{ steps.meta.outputs.package_version }}.tgz"
          bun pm pack --filename "${tarball}" --quiet >/dev/null
          test -f "${tarball}"
          tar_contents="$(tar -tzf "${tarball}")"
          grep -Fqx -- "package/package.json" <<<"${tar_contents}"
          grep -Fqx -- "package/bin/agent-mockingbird" <<<"${tar_contents}"
          grep -Fqx -- "package/bin/runtime-assets.mjs" <<<"${tar_contents}"
          grep -Fqx -- "package/apps/server/package.json" <<<"${tar_contents}"
          grep -Fqx -- "package/apps/server/src/index.ts" <<<"${tar_contents}"
          grep -Fqx -- "package/packages/api/package.json" <<<"${tar_contents}"
          grep -Fqx -- "package/packages/contracts/package.json" <<<"${tar_contents}"
          grep -Fqx -- "package/dist/web/index.html" <<<"${tar_contents}"
          echo "AGENT_MOCKINGBIRD_TARBALL=${tarball}" >> "${GITHUB_ENV}"
          ls -lh -- "${tarball}"

      - name: Pack agent-mockingbird-installer artifact
        if: steps.meta.outputs.should_publish == 'true'
        run: |
          set -euo pipefail
          tarball="agent-mockingbird-installer-${{ steps.meta.outputs.package_version }}.tgz"
          (
            cd packages/agent-mockingbird-installer
            bun pm pack --filename "../../${tarball}" --quiet >/dev/null
          )
          test -f "${tarball}"
          echo "AGENT_MOCKINGBIRD_INSTALLER_TARBALL=${tarball}" >> "${GITHUB_ENV}"
          ls -lh -- "${tarball}"

      - name: Configure registry auth
        if: steps.meta.outputs.should_publish == 'true'
        run: |
          set -euo pipefail
          echo "::add-mask::${REGISTRY_TOKEN}"
          registry="$(printf '%s' "${REGISTRY_URL}" | tr -d '\r' | sed 's/[[:space:]]*$//')"
          registry="${registry%/}/"
          registry_no_proto="${registry#https://}"
          registry_no_proto="${registry_no_proto#http://}"
          registry_host="${registry_no_proto%%/*}"
          {
            printf "@%s:registry=%s\n" "${REGISTRY_SCOPE}" "${registry}"
            printf "registry=%s\n" "${registry}"
            printf "always-auth=true\n"
            printf "//%s:_authToken=%s\n" "${registry_no_proto}" "${REGISTRY_TOKEN}"
            printf "//%s/:_authToken=%s\n" "${registry_host}" "${REGISTRY_TOKEN}"
          } > "${HOME}/.npmrc"

      - name: Debug registry auth (safe)
        if: steps.meta.outputs.should_publish == 'true'
        run: |
          set -euo pipefail
          echo "Registry URL: ${REGISTRY_URL%/}/"
          echo "Registry scope: ${REGISTRY_SCOPE}"
          echo "Token length: ${#REGISTRY_TOKEN}"
          echo "package.json publishConfig.registry:"
          bun -e 'const p=require("./package.json"); console.log(p.publishConfig?.registry || "<missing>")'
          echo ".npmrc (token redacted):"
          sed -E 's#(_authToken=).*#\1***REDACTED***#' "${HOME}/.npmrc"
          echo ".npmrc visible control chars:"
          cat -vet "${HOME}/.npmrc"
          echo "npm whoami via bunx:"
          bunx npm whoami --registry "${REGISTRY_URL%/}/" || true

      - name: Publish package tarball
        if: steps.meta.outputs.should_publish == 'true'
        run: |
          set -euo pipefail
          package_name="@${REGISTRY_SCOPE}/agent-mockingbird"
          package_version="${{ steps.meta.outputs.package_version }}"
          if bunx npm view "${package_name}@${package_version}" version --registry "${REGISTRY_URL%/}/" >/dev/null 2>&1; then
            echo "Version ${package_name}@${package_version} already exists; skipping publish."
            exit 0
          fi
          bunx npm publish "${AGENT_MOCKINGBIRD_TARBALL}" --registry "${REGISTRY_URL%/}/" --tag "${{ steps.meta.outputs.npm_tag }}"

      - name: Publish installer package tarball
        if: steps.meta.outputs.should_publish == 'true'
        run: |
          set -euo pipefail
          package_name="@${REGISTRY_SCOPE}/agent-mockingbird-installer"
          package_version="${{ steps.meta.outputs.package_version }}"
          if bunx npm view "${package_name}@${package_version}" version --registry "${REGISTRY_URL%/}/" >/dev/null 2>&1; then
            echo "Version ${package_name}@${package_version} already exists; skipping publish."
            exit 0
          fi
          bunx npm publish "${AGENT_MOCKINGBIRD_INSTALLER_TARBALL}" --registry "${REGISTRY_URL%/}/" --tag "${{ steps.meta.outputs.npm_tag }}"
